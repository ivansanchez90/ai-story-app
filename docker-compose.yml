version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: story_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: storydb
    ports:
      - '5440:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
